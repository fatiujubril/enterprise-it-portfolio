<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A scene showing the Microsoft cloud at the top, a hardware vendor building at the top left uploading device IDs to the cloud, an on-prem datacenter building at the bottom left, an IT admin figure in the middle, and an employee at a desk with a laptop at the bottom right. Arrows show Entra Connect sync between the building and the cloud, the admin uploading the device hash and profile, the cloud delivering apps and policies to the laptop, and domain join traffic between the building and the desk.</desc>
